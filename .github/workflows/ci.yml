name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Check generated catalog
        run: python scripts/sync_catalog.py --check

      - name: Python syntax
        run: python -m py_compile server.py tray_app.py "Kokoro TTS.pyw" tts_catalog.py windows_runtime.py

      - name: Python tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: JavaScript syntax and tests
        run: |
          node --check tts-userscript.js
          node --test tests/userscript-core.test.cjs

      - name: Dependency check
        run: python -m pip check
